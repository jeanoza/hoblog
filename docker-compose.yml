services:
  db:
    image: postgres:17
    env_file:
      - .env
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    expose:
      - "${BACKEND_PORT}"
    env_file:
      - ./backend/.env
    environment:
      # Override vars that differ between local dev and Docker
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
      PORT: ${BACKEND_PORT}
      FRONTEND_URL: ${FRONTEND_URL}
      GCS_KEY_FILE: /app/gcp-key.json
    volumes:
      - ./backend/gcp-key.json:/app/gcp-key.json:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    expose:
      - "${FRONTEND_PORT}"
    environment:
      NODE_ENV: production
      PORT: ${FRONTEND_PORT}
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_HOST_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/${NGINX_CONFIG:-nginx.http.conf}:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    profiles:
      - certbot

volumes:
  postgres_data:
