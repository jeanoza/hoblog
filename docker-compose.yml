services:
  db:
    image: postgres:17
    env_file:
      - .env
    ports:
      - "20003:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "20002:20002"
    env_file:
      - ./backend/.env
    environment:
      # Override vars that differ between local dev and Docker
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PORT: 20002
      FRONTEND_URL: http://localhost:20001
      GCS_KEY_FILE: /app/gcp-key.json
    volumes:
      - ./backend/gcp-key.json:/app/gcp-key.json:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:20002
    ports:
      - "20001:20001"
    depends_on:
      - backend

volumes:
  postgres_data:
