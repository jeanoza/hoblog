services:
  db:
    image: postgres:17
    env_file:
      - .env
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_HOST_PORT}:${BACKEND_PORT}"
    env_file:
      - ./backend/.env
    environment:
      # Override vars that differ between local dev and Docker
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
      PORT: ${BACKEND_PORT}
      FRONTEND_URL: ${FRONTEND_URL}
      GCS_KEY_FILE: /app/gcp-key.json
    volumes:
      - ./backend/gcp-key.json:/app/gcp-key.json:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "${FRONTEND_HOST_PORT}:${FRONTEND_PORT}"
    environment:
      PORT: ${FRONTEND_PORT}
    depends_on:
      - backend

volumes:
  postgres_data:
