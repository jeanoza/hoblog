# Production: jeanoza.com + Let's Encrypt (see scripts/init-letsencrypt.sh)
events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:20001;
    }

    upstream backend {
        server backend:20002;
    }

    server {
        listen 80;
        server_name jeanoza.com www.jeanoza.com;

        client_max_body_size 20m;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name jeanoza.com www.jeanoza.com;

        ssl_certificate /etc/letsencrypt/live/jeanoza.com-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/jeanoza.com-0001/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 20m;

        location /api/ {
            proxy_pass http://backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
