# Used only by scripts/init-letsencrypt.sh: HTTP + ACME before TLS certs exist.
# server_name must match DOMAIN in .env and nginx.conf.
events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:20001;
    }

    upstream backend {
        server backend:20002;
    }

    server {
        listen 80;
        server_name hoblog.space www.hoblog.space;

        client_max_body_size 20m;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location /api/ {
            proxy_pass http://backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
